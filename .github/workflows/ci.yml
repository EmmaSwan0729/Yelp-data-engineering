name: CI

on:
  push:
    branches: [ main ]
    paths:
      - 'tests/**'
      - '**.py'
      - 'requirements-dev.txt'
  pull_request:
    branches: [ main ]
    paths:
      - 'tests/**'
      - '**.py'
      - 'requirements-dev.txt'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      
      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run unit tests
        run: pytest tests/unit/ -v
